server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Frappe API proxy
    location /api/ {
        proxy_pass https://rcistoc.cronbi.com/api/;
        proxy_cookie_domain rcistoc.cronbi.com rc.istoc.com;
        proxy_ssl_server_name on;
        proxy_set_header Host rcistoc.cronbi.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Private files — Frappe permission-checked download (identity docs etc.)
    location /private/files/ {
        proxy_pass https://rcistoc.cronbi.com/private/files/;
        proxy_ssl_server_name on;
        proxy_set_header Host rcistoc.cronbi.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public files (product images etc.)
    location /files/ {
        proxy_pass https://rcistoc.cronbi.com/files/;
        proxy_ssl_server_name on;
        proxy_set_header Host rcistoc.cronbi.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # File upload size limit
    client_max_body_size 50m;

    # Assets proxy
    location /assets/ {
        proxy_pass https://rcistoc.cronbi.com/assets/;
        proxy_ssl_server_name on;
        proxy_set_header Host rcistoc.cronbi.com;
    }

    # Socket.IO WebSocket proxy
    location /socket.io/ {
        proxy_pass https://rcistoc.cronbi.com/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_ssl_server_name on;
        proxy_set_header Host rcistoc.cronbi.com;
    }

    # Frontend statik dosyalar + SPA fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    error_page 404 /404.html;
}
