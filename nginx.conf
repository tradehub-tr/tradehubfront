server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Frappe /api/ proxy → TradeHub Core backend
    location /api/ {
        proxy_pass https://rcistoc.cronbi.com/api/;
        proxy_cookie_domain rcistoc.cronbi.com rc.istoc.com;
        proxy_ssl_server_name on;
        proxy_set_header Host rcistoc.cronbi.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frappe /method/ → /api/method/ rewrite (storefront bu path'i kullanıyor)
    location /method/ {
        rewrite ^/method/(.*)$ /api/method/$1 break;
        proxy_pass https://rcistoc.cronbi.com;
        proxy_cookie_domain rcistoc.cronbi.com rc.istoc.com;
        proxy_ssl_server_name on;
        proxy_set_header Host rcistoc.cronbi.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /files/ {
        proxy_pass https://rcistoc.cronbi.com/files/;
        proxy_ssl_server_name on;
        proxy_set_header Host rcistoc.cronbi.com;
    }

    location /private/files/ {
        proxy_pass https://rcistoc.cronbi.com/private/files/;
        proxy_ssl_server_name on;
        proxy_set_header Host rcistoc.cronbi.com;
    }

    location /assets/ {
        proxy_pass https://rcistoc.cronbi.com/assets/;
        proxy_ssl_server_name on;
        proxy_set_header Host rcistoc.cronbi.com;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
