name: Beta Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  beta-release:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git ayarlari
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Beta versiyon belirle
        id: version
        run: |
          LAST_PROD=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          LAST_PROD=${LAST_PROD:-"v1.0.0"}
          BETA_COUNT=$(git tag --sort=-v:refname | grep "^${LAST_PROD}-beta\." | wc -l)
          BETA_NUM=$((BETA_COUNT + 1))
          BETA_VERSION="${LAST_PROD}-beta.${BETA_NUM}"
          # PREV = en son var olan tag (BETA_VERSION henuz olusmadigi icin head -1 bir onceki tag'i verir)
          PREV=$(git tag --sort=-v:refname | grep -v "^${BETA_VERSION}$" | head -1)
          PREV=${PREV:-${LAST_PROD}}
          echo "beta_version=${BETA_VERSION}" >> $GITHUB_OUTPUT
          echo "last_prod=${LAST_PROD}" >> $GITHUB_OUTPUT
          echo "prev=${PREV}" >> $GITHUB_OUTPUT

      - name: Beta CHANGELOG olustur
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=${{ steps.version.outputs.prev }}
          BETA_VERSION=${{ steps.version.outputs.beta_version }}
          DATE=$(date +%Y-%m-%d)

          FEATS=""
          FIXES=""
          REFACTORS=""
          if git rev-parse "${PREV}" >/dev/null 2>&1; then
            # JQ: her commit icin subject + body bullet'larini ayri ayri emit eder.
            # Body'deki "- ..." satirlari subject'in type'i (feat/fix/refactor) altinda
            # ayri CHANGELOG bullet'i olur; alt-basliklar (ornegin "Chat popup") atlanir.
            # Output formati: "<type>|- <text> (@<author>)" — bash sed ile ayristirir.
            COMMITS=$(gh api "repos/${{ github.repository }}/compare/${PREV}...HEAD" \
              --jq '
                def alias(n):
                  ({"ahmet":"ahmeetseker","Ahmet":"ahmeetseker","AHMET":"ahmeetseker",
                    "bora":"boraydeger32","Bora":"boraydeger32","BORA":"boraydeger32",
                    "ali":"aliiball","Ali":"aliiball","ALI":"aliiball"})[n] // n;
                def flatten_bullets:
                  reduce (split("\n")[]) as $line (
                    {out: [], cur: null, indent: 0};
                    if ($line | test("^\\s*-\\s+")) then
                      (if .cur then .out += [.cur] else . end)
                      | .indent = (($line | capture("^(?<i>\\s*)-").i) | length)
                      | .cur = ($line | sub("^\\s*-\\s+"; "") | gsub("\\s+$"; ""))
                    elif (.cur != null)
                         and ($line | test("^\\s+\\S"))
                         and ((($line | capture("^(?<i>\\s*)\\S").i) | length) > .indent) then
                      .cur = (.cur + " " + ($line | gsub("^\\s+|\\s+$"; "")))
                    else
                      (if .cur then .out += [.cur] else . end) | .cur = null | .indent = 0
                    end
                  )
                  | .out + (if .cur then [.cur] else [] end);
                .commits[]
                | .commit.message as $msg
                | (alias(.author.login // .commit.author.name)) as $author
                | ($msg | split("\n")[0] | sub("^ +"; "")) as $subject
                | (
                    if   ($subject | test("^feat($|[(:!])"))     then "feat"
                    elif ($subject | test("^fix($|[(:!])"))      then "fix"
                    elif ($subject | test("^refactor($|[(:!])")) then "refactor"
                    else null end
                  ) as $type
                | select($type != null)
                | ($msg | sub("^[^\n]*(\n|$)"; "") | flatten_bullets) as $body
                | (
                    ["\($type)|- \($subject) (@\($author))"]
                    + ($body | map("\($type)|  - \(.)"))
                  )
                | .[]
              ')
            FEATS=$(echo "$COMMITS" | sed -n 's/^feat|//p' | awk '!seen[$0]++')
            FIXES=$(echo "$COMMITS" | sed -n 's/^fix|//p' | awk '!seen[$0]++')
            REFACTORS=$(echo "$COMMITS" | sed -n 's/^refactor|//p' | awk '!seen[$0]++')
          fi

          # Empty-guard: yeni feat/fix/refactor commit'i yoksa CHANGELOG'a yazma (promote-only)
          if [ -z "$FEATS$FIXES$REFACTORS" ]; then
            echo "Yeni feat/fix/refactor commit'i yok — CHANGELOG'a yazilmayacak (promote-only)."
            {
              echo "skip_changelog=true"
              echo "entry<<EOF"
              echo "_Bu surum onceki surumden promote edildi (yeni commit yok)._"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            exit 0
          fi

          ENTRY="## [${BETA_VERSION}] - ${DATE} BETA\n\n"
          ENTRY+="Bu surum beta.istoc.com'da test asamasindadir.\n\n"

          if [ -n "$FEATS" ]; then ENTRY+="### Eklendi\n${FEATS}\n\n"; fi
          if [ -n "$FIXES" ]; then ENTRY+="### Duzeltildi\n${FIXES}\n\n"; fi
          if [ -n "$REFACTORS" ]; then ENTRY+="### Degistirildi\n${REFACTORS}\n\n"; fi
          ENTRY+="---\n"

          printf "${ENTRY}" > /tmp/new_entry.md
          cat /tmp/new_entry.md CHANGELOG.md > /tmp/merged.md
          mv /tmp/merged.md CHANGELOG.md

          echo "entry<<EOF" >> $GITHUB_OUTPUT
          printf "${ENTRY}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: package.json versiyonunu senkronla
        run: |
          BETA_VERSION=${{ steps.version.outputs.beta_version }}
          npm version "${BETA_VERSION#v}" --no-git-tag-version --allow-same-version

      - name: Commit ve tag
        run: |
          BETA_VERSION=${{ steps.version.outputs.beta_version }}
          # Tag immutability — aynı tag tekrar atılmasın (kirli state guard)
          if git rev-parse "${BETA_VERSION}" >/dev/null 2>&1; then
            echo "HATA: Tag ${BETA_VERSION} zaten var" >&2
            exit 1
          fi
          git add package.json package-lock.json 2>/dev/null || git add package.json
          if [ "${{ steps.changelog.outputs.skip_changelog }}" != "true" ]; then
            git add CHANGELOG.md
            git commit -m "chore: ${BETA_VERSION} beta changelog + package.json"
          else
            git commit -m "chore: ${BETA_VERSION} package.json senkron (promote-only)"
          fi
          git push origin main
          git tag ${BETA_VERSION}
          git push origin ${BETA_VERSION}

      - name: GitHub Beta Release olustur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.beta_version }}
          name: "BETA - ${{ steps.version.outputs.beta_version }}"
          body: ${{ steps.changelog.outputs.entry }}
          prerelease: true

      - name: Notify changelog site
        if: success() && steps.changelog.outputs.skip_changelog != 'true'
        continue-on-error: true
        env:
          DISPATCH_PAT: ${{ secrets.CHANGELOG_DISPATCH_PAT }}
          SOURCE_LABEL: frontend
          VERSION_OUT: ${{ steps.version.outputs.beta_version }}
        run: |
          if [ -z "$DISPATCH_PAT" ]; then
            echo "CHANGELOG_DISPATCH_PAT secret not set; skipping dispatch"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer $DISPATCH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/TurksabYonetim/istoc-changelog/dispatches \
            -d "{\"event_type\":\"changelog-updated\",\"client_payload\":{\"source\":\"${SOURCE_LABEL}\",\"version\":\"${VERSION_OUT}\"}}"
