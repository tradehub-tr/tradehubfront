hayıname: Deploy Storefront

on:
  push:
    branches: [ main, ahmet, ali, bora ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── 1. Sunucuya deploy (sadece main) ──────────────────
  deploy-server:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 152.53.147.222
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 5055
          script: |
            cd /opt/tradehub/storefront
            git pull origin main
            cd /opt/tradehub
            docker compose build storefront
            docker compose up -d storefront
            echo "✅ Storefront deploy tamamlandı"

  # ── 2. GitHub Pages deploy (ahmet, ali, bora) ──────────
  deploy-pages:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npx vite build
        env:
          VITE_API_URL: https://rc.istoc.com/api

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
