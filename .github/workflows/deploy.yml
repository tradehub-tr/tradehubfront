name: Deploy Storefront

on:
  push:
    branches: [ main, ahmet, ali, bora ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── 1. Alpha sunucuya deploy (sadece main) ────────────
  # main → alpha.istoc.com (otomatik) — frontend build BURADA yapilir
  # beta.istoc.com / rc.istoc.com / istoc.com için Jenkins pipeline'ları kullanılır.
  deploy-alpha:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ALPHA server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 152.53.147.222
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 5055
          script: |
            set -e
            cd /opt/tradehub-alpha/storefront
            git reset --hard origin/main
            git pull origin main
            cd /opt/tradehub-alpha
            docker compose build --no-cache storefront-alpha
            docker compose up -d --force-recreate storefront-alpha
            echo "✅ Storefront ALPHA deploy tamamlandı → https://alpha.istoc.com"

  # ── 2. GitHub Pages deploy (ahmet, ali, bora) ──────────
  deploy-pages:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npx vite build
        env:
          VITE_API_URL: https://alpha.istoc.com/api
          VITE_MEDIA_BASE: https://alpha.istoc.com

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
