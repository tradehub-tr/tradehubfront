name: Prod Release

# Bu workflow Jenkins'in RC→PROD pipeline'ı tarafından tetiklenir.
# Tag formatı: vX.Y.Z (semver, beta/rc suffix yok)
# Jenkins çağrısı: gh workflow run prod-release.yml -f version_type=patch
on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Versiyon tipi (auto: commit''lerden otomatik tespit; manuel override icin patch/minor/major)'
        required: true
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  prod-release:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git ayarlari
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump tipini belirle (auto / manuel)
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT="${{ inputs.version_type }}"
          if [ "$INPUT" != "auto" ]; then
            echo "Manuel bump: $INPUT"
            echo "type=$INPUT" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Auto: PREV...HEAD araligindaki commit'leri Conventional Commits patternleriyle tara
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          PREV=${PREV:-"v0.0.0"}
          if ! git rev-parse "${PREV}" >/dev/null 2>&1; then
            echo "PREV (${PREV}) yok, fallback: patch"
            echo "type=patch" >> $GITHUB_OUTPUT
            exit 0
          fi
          SUBJECTS=$(gh api "repos/${{ github.repository }}/compare/${PREV}...HEAD" --jq '.commits[].commit.message')
          BUMP="patch"
          if echo "$SUBJECTS" | grep -qE "^[a-z]+(\([^)]+\))?!:"; then
            BUMP="major"
            echo "Tetik: ! isareti (BREAKING CHANGE)"
          elif echo "$SUBJECTS" | grep -qE "^BREAKING[ -]CHANGE:"; then
            BUMP="major"
            echo "Tetik: BREAKING CHANGE footer"
          elif echo "$SUBJECTS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP="minor"
            echo "Tetik: feat: pattern"
          else
            echo "Conventional Commit pattern yok, fallback: patch"
          fi
          echo "Otomatik tespit: $BUMP"
          echo "type=$BUMP" >> $GITHUB_OUTPUT

      - name: Prod versiyon belirle
        id: version
        run: |
          LAST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          LAST=${LAST:-"v1.0.0"}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST#v}"
          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          # PREV = en son var olan tag (NEW_VERSION henuz olusmadigi icin head -1 bir onceki tag'i verir)
          PREV=$(git tag --sort=-v:refname | grep -v "^${NEW_VERSION}$" | head -1)
          PREV=${PREV:-${LAST}}
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "prev_version=${LAST}" >> $GITHUB_OUTPUT
          echo "prev=${PREV}" >> $GITHUB_OUTPUT

      - name: Prod CHANGELOG olustur
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=${{ steps.version.outputs.prev }}
          VERSION=${{ steps.version.outputs.version }}
          DATE=$(date +%Y-%m-%d)

          FEATS=""
          FIXES=""
          REFACTORS=""
          if git rev-parse "${PREV}" >/dev/null 2>&1; then
            # JQ: her commit icin subject + body bullet'larini ayri ayri emit eder.
            # Body'deki "- ..." satirlari subject'in type'i (feat/fix/refactor) altinda
            # ayri CHANGELOG bullet'i olur; alt-basliklar (ornegin "Chat popup") atlanir.
            # Output formati: "<type>|- <text> (@<author>)" — bash sed ile ayristirir.
            COMMITS=$(gh api "repos/${{ github.repository }}/compare/${PREV}...HEAD" \
              --jq '
                def alias(n):
                  ({"ahmet":"ahmeetseker","Ahmet":"ahmeetseker","AHMET":"ahmeetseker",
                    "bora":"boraydeger32","Bora":"boraydeger32","BORA":"boraydeger32",
                    "ali":"aliiball","Ali":"aliiball","ALI":"aliiball"})[n] // n;
                def flatten_bullets:
                  reduce (split("\n")[]) as $line (
                    {out: [], cur: null, indent: 0};
                    if ($line | test("^\\s*-\\s+")) then
                      (if .cur then .out += [.cur] else . end)
                      | .indent = (($line | capture("^(?<i>\\s*)-").i) | length)
                      | .cur = ($line | sub("^\\s*-\\s+"; "") | gsub("\\s+$"; ""))
                    elif (.cur != null)
                         and ($line | test("^\\s+\\S"))
                         and ((($line | capture("^(?<i>\\s*)\\S").i) | length) > .indent) then
                      .cur = (.cur + " " + ($line | gsub("^\\s+|\\s+$"; "")))
                    else
                      (if .cur then .out += [.cur] else . end) | .cur = null | .indent = 0
                    end
                  )
                  | .out + (if .cur then [.cur] else [] end);
                .commits[]
                | .commit.message as $msg
                | (alias(.author.login // .commit.author.name)) as $author
                | ($msg | split("\n")[0] | sub("^ +"; "")) as $subject
                | (
                    if   ($subject | test("^feat($|[(:!])"))     then "feat"
                    elif ($subject | test("^fix($|[(:!])"))      then "fix"
                    elif ($subject | test("^refactor($|[(:!])")) then "refactor"
                    else null end
                  ) as $type
                | select($type != null)
                | ($msg | sub("^[^\n]*(\n|$)"; "") | flatten_bullets) as $body
                | (
                    ["\($type)|- \($subject) (@\($author))"]
                    + ($body | map("\($type)|  - \(.)"))
                  )
                | .[]
              ')
            FEATS=$(echo "$COMMITS" | sed -n 's/^feat|//p' | awk '!seen[$0]++')
            FIXES=$(echo "$COMMITS" | sed -n 's/^fix|//p' | awk '!seen[$0]++')
            REFACTORS=$(echo "$COMMITS" | sed -n 's/^refactor|//p' | awk '!seen[$0]++')
          fi

          # Empty-guard: yeni feat/fix/refactor commit'i yoksa CHANGELOG'a yazma (promote-only)
          if [ -z "$FEATS$FIXES$REFACTORS" ]; then
            echo "Yeni feat/fix/refactor commit'i yok — CHANGELOG'a yazilmayacak (promote-only)."
            {
              echo "skip_changelog=true"
              echo "entry<<EOF"
              echo "_Bu surum onceki surumden promote edildi (yeni commit yok)._"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            exit 0
          fi

          ENTRY="## [${VERSION}] - ${DATE} PROD\n\n"
          ENTRY+="Bu surum istoc.com'da yayindadir.\n\n"

          if [ -n "$FEATS" ]; then ENTRY+="### Eklendi\n${FEATS}\n\n"; fi
          if [ -n "$FIXES" ]; then ENTRY+="### Duzeltildi\n${FIXES}\n\n"; fi
          if [ -n "$REFACTORS" ]; then ENTRY+="### Degistirildi\n${REFACTORS}\n\n"; fi
          ENTRY+="---\n"

          printf "${ENTRY}" > /tmp/new_entry.md
          cat /tmp/new_entry.md CHANGELOG.md > /tmp/merged.md
          mv /tmp/merged.md CHANGELOG.md

          echo "entry<<EOF" >> $GITHUB_OUTPUT
          printf "${ENTRY}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: package.json versiyonunu senkronla
        run: |
          VERSION=${{ steps.version.outputs.version }}
          npm version "${VERSION#v}" --no-git-tag-version --allow-same-version

      - name: Commit ve tag
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "HATA: Tag ${VERSION} zaten var" >&2
            exit 1
          fi
          git add package.json package-lock.json 2>/dev/null || git add package.json
          if [ "${{ steps.changelog.outputs.skip_changelog }}" != "true" ]; then
            git add CHANGELOG.md
            git commit -m "chore: ${VERSION} prod changelog + package.json"
          else
            git commit -m "chore: ${VERSION} package.json senkron (promote-only)"
          fi
          git push origin main
          git tag ${VERSION}
          git push origin ${VERSION}

      - name: GitHub Prod Release olustur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "PROD - ${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.entry }}
          prerelease: false

      - name: Notify changelog site
        if: success() && steps.changelog.outputs.skip_changelog != 'true'
        continue-on-error: true
        env:
          DISPATCH_PAT: ${{ secrets.CHANGELOG_DISPATCH_PAT }}
          SOURCE_LABEL: frontend
          VERSION_OUT: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$DISPATCH_PAT" ]; then
            echo "CHANGELOG_DISPATCH_PAT secret not set; skipping dispatch"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer $DISPATCH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/TurksabYonetim/istoc-changelog/dispatches \
            -d "{\"event_type\":\"changelog-updated\",\"client_payload\":{\"source\":\"${SOURCE_LABEL}\",\"version\":\"${VERSION_OUT}\"}}"
